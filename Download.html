        .nav {

.Download-card{
    display:flex;

    gap:20px;
    max-width:750px;
    margin:20px auto;
    padding:15px;
    background:white;
    border-radius:12px;
}


.Download-card img{
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}


.song-info{
    flex:1;
}

.song-info h3{
    margin:5px 0;
}

.song-info p{
    color:gray;
}


.song-info a button{
    margin-top:10px;
    padding:8px 16px;
    border:none;
    border-radius:20px;
    background:skyblue;
    cursor:pointer;
}

.song-info a button:hover{
    background:black;
    color:white;
}
.delete-btn{
    margin-left:10px;
    padding:8px 16px;
    border:none;
    border-radius:20px;
    background:red;
    color:white;
    cursor:pointer;
}

.delete-btn:hover{
    background:black;
}
